<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTTP Header Injector</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="4" width="20" height="4" rx="2" fill="#6366f1"/>
          <rect x="2" y="11" width="14" height="4" rx="2" fill="#818cf8"/>
          <rect x="2" y="18" width="18" height="4" rx="2" fill="#a5b4fc"/>
          <circle cx="20" cy="13" r="3" fill="#ef4444"/>
        </svg>
      </div>
      <h1>HTTP Header Injector</h1>
      <span class="badge" id="ruleCount">0</span>
    </header>

    <div class="add-form">
      <div class="form-row">
        <input type="text" id="headerName" placeholder="Header 名称 (例: client_id)" autocomplete="off">
        <input type="text" id="headerValue" placeholder="Header 值 (例: abcd123456)" autocomplete="off">
      </div>
      <button id="addBtn" class="btn btn-primary">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 2a.75.75 0 01.75.75v4.5h4.5a.75.75 0 010 1.5h-4.5v4.5a.75.75 0 01-1.5 0v-4.5h-4.5a.75.75 0 010-1.5h4.5v-4.5A.75.75 0 018 2z"/>
        </svg>
        添加
      </button>
    </div>

    <div class="rules-list" id="rulesList">
      <!-- 动态渲染 -->
    </div>

    <div class="empty-state" id="emptyState">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="1.5">
        <path d="M12 9v3m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      <p>暂无规则，请添加头部信息</p>
    </div>

    <footer class="footer">
      <button id="toggleAllBtn" class="btn btn-outline">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M2 4.5L6 8.5M6 8.5L2 12.5M6 8.5H14"/>
        </svg>
        <span id="toggleText">暂停注入</span>
      </button>
      <button id="exportBtn" class="btn btn-ghost">导出</button>
      <button id="importBtn" class="btn btn-ghost">导入</button>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
